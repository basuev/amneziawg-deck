name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest
      - run: python -m pytest tests/ -v

  fe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  bin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build static bins via Docker
        run: bash scripts/build_bin.sh
      - uses: actions/upload-artifact@v4
        with:
          name: bin
          path: bin/

  package:
    needs: [py, fe, bin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: bin
          path: bin/
      - run: chmod +x bin/amneziawg-go bin/awg bin/awg-quick
      - run: bash scripts/package.sh
      - uses: actions/upload-artifact@v4
        with:
          name: AmneziaWG
          path: AmneziaWG.zip
